name: miaobi_flutter
description: "妙笔 - AI小说写作助手"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  provider: ^6.1.2

  # Dependency Injection
  get_it: ^7.7.0

  # Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Code generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # HTTP
  http: ^1.2.0

  # Local persistence
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.0.0

  # UI
  cupertino_icons: ^1.0.8
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
